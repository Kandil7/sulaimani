name: sulaimani
description: نظام إدارة صيدلية السليماني
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.4

  # DI
  get_it: ^7.7.0

  # Functional Programming
  dartz: ^0.10.1

  # Navigation
  go_router: ^14.0.0

  # PDF & Printing
  pdf: ^3.11.0
  printing: ^5.13.0

  # Charts
  fl_chart: ^0.69.0

  # Tables
  data_table_2: ^2.5.12

  # Notifications
  flutter_local_notifications: ^17.2.0

  # Window Management (Desktop)
  window_manager: ^0.3.9

  # Date Formatting
  intl: ^0.19.0

  # Utilities
  uuid: ^4.5.1
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo/Cairo-Bold.ttf
          weight: 700
